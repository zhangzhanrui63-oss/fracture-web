<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骨折智能分析</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin: 20px 0;
        }
        .upload-area:hover { border-color: #3498db; background: #f0f8ff; }
        #fileInput { display: none; }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #2980b9; }
        button:disabled { background: #b0c4de; cursor: not-allowed; }
        .result-row {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .image-box {
            flex: 1;
            text-align: center;
        }
        .image-box img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .report {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border-left: 5px solid #3498db;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🩻 骨折辅助分析</h1>
    <p>上传X光片，AI将自动标注疑似骨折区域</p >

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p>📤 点击或拖拽上传图片</p >
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <button id="analyzeBtn" disabled>请先上传图片</button>

    <div class="result-row">
        <div class="image-box">
            <h3>原始图片</h3>
            < img id="originalImg" style="display:none;">
            <p id="originalPlaceholder">暂无</p >
        </div>
        <div class="image-box">
            <h3>AI分析结果</h3>
            < img id="resultImg" style="display:none;">
            <p id="resultPlaceholder">点击分析后显示</p >
        </div>
    </div>

    <div class="report" id="report" style="display:none;">
        <strong>分析报告：</strong>
        <p id="reportText"></p >
    </div>
</div>

<script>
    // ===== 把你自己的 Hugging Face 地址粘贴到这里 =====
    const HF_URL = "https://zzzrrr-zzzrrr.hf.space";
    // =================================================

    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const originalImg = document.getElementById('originalImg');
    const originalPlaceholder = document.getElementById('originalPlaceholder');
    const resultImg = document.getElementById('resultImg');
    const resultPlaceholder = document.getElementById('resultPlaceholder');
    const report = document.getElementById('report');
    const reportText = document.getElementById('reportText');

    let selectedFile = null;

    fileInput.addEventListener('change', function(e) {
        if (fileInput.files.length > 0) {
            selectedFile = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                originalImg.src = e.target.result;
                originalImg.style.display = 'block';
                originalPlaceholder.style.display = 'none';
            };
            reader.readAsDataURL(selectedFile);
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = '🔬 开始分析';
            resultImg.style.display = 'none';
            resultPlaceholder.style.display = 'block';
            report.style.display = 'none';
        }
    });

    analyzeBtn.addEventListener('click', async function() {
        if (!selectedFile) return;

        analyzeBtn.disabled = true;
        analyzeBtn.textContent = '⏳ 分析中...';
        resultPlaceholder.textContent = 'AI正在分析，请稍候...';

        const formData = new FormData();
        formData.append('data', selectedFile);

        try {
            const response = await fetch(HF_URL + '/api/predict', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.data && result.data.length >= 2) {
                const imgData = result.data[0];
                const diagnosis = result.data[1];

                resultImg.src = imgData.startsWith('data:') ? imgData : 'data:image/png;base64,' + imgData;
                resultImg.style.display = 'block';
                resultPlaceholder.style.display = 'none';

                reportText.textContent = diagnosis;
                report.style.display = 'block';
            }

        } catch (error) {
            resultPlaceholder.textContent = '分析失败，请重试';
            console.error(error);
        }

        analyzeBtn.disabled = false;
        analyzeBtn.textContent = '🔬 开始分析';
    });
</script>
</body>
</html>
