<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骨折智能分析</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .upload-area { border: 2px dashed #ccc; border-radius: 15px; padding: 40px; text-align: center; cursor: pointer; margin: 20px 0; }
        .upload-area:hover { border-color: #3498db; background: #f0f8ff; }
        #fileInput { display: none; }
        button { background: #3498db; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 30px; cursor: pointer; width: 100%; }
        button:hover { background: #2980b9; }
        button:disabled { background: #b0c4de; cursor: not-allowed; }
        .result-row { display: flex; gap: 20px; margin-top: 20px; }
        .image-box { flex: 1; text-align: center; }
        .image-box img { max-width: 100%; max-height: 300px; border-radius: 10px; }
        .report { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-top: 20px; border-left: 5px solid #3498db; }
        .error-box { background: #fee; border-left: 5px solid #e74c3c; padding: 20px; border-radius: 15px; margin-top: 20px; }
    </style>
    <!-- 引入 Gradio 官方 JS 客户端 -->
    <script type="module" src="https://gradio.s3-us-west-2.amazonaws.com/5.0.0/gradio.js"></script>
</head>
<body>
<div class="container">
    <h1>🩻 骨折辅助分析</h1>
    <p>上传X光片，AI将自动标注疑似骨折区域</p >

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p>📤 点击或拖拽上传图片</p >
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <button id="analyzeBtn" disabled>请先上传图片</button>

    <div class="result-row">
        <div class="image-box">
            <h3>原始图片</h3>
            < img id="originalImg">
            <p id="originalPlaceholder">暂无</p >
        </div>
        <div class="image-box">
            <h3>AI分析结果</h3>
            < img id="resultImg">
            <p id="resultPlaceholder">点击分析后显示</p >
        </div>
    </div>

    <div class="report" id="report" style="display:none;">
        <strong>分析报告：</strong>
        <p id="reportText"></p >
    </div>

    <div class="error-box" id="errorBox" style="display:none;">
        <strong>调试信息：</strong>
        <p id="errorDetail"></p >
    </div>
</div>

<script>
    const SPACE_URL = "https://zzzrrrr-zzzrrr.hf.space";
    
    let selectedFile = null;
    let gradioApp = null;

    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const originalImg = document.getElementById('originalImg');
    const originalPlaceholder = document.getElementById('originalPlaceholder');
    const resultImg = document.getElementById('resultImg');
    const resultPlaceholder = document.getElementById('resultPlaceholder');
    const report = document.getElementById('report');
    const reportText = document.getElementById('reportText');
    const errorBox = document.getElementById('errorBox');
    const errorDetail = document.getElementById('errorDetail');

    // 初始化 Gradio 客户端
    async function initGradio() {
        try {
            const { client } = await import("https://gradio.s3-us-west-2.amazonaws.com/5.0.0/gradio.js");
            gradioApp = await client.connect(SPACE_URL);
            console.log("✅ Gradio 连接成功！");
        } catch (error) {
            console.error("❌ Gradio 连接失败:", error);
            errorBox.style.display = 'block';
            errorDetail.textContent = '连接后台失败: ' + error.message;
        }
    }
    initGradio();

    fileInput.addEventListener('change', function() {
        if (fileInput.files.length > 0) {
            selectedFile = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                originalImg.src = e.target.result;
                originalImg.style.display = 'block';
                originalPlaceholder.style.display = 'none';
            };
            reader.readAsDataURL(selectedFile);
            analyzeBtn.disabled = false;
            resultImg.style.display = 'none';
            resultPlaceholder.style.display = 'block';
            resultPlaceholder.textContent = '点击分析后显示';
            report.style.display = 'none';
            errorBox.style.display = 'none';
        }
    });

    analyzeBtn.addEventListener('click', async function() {
        if (!selectedFile || !gradioApp) {
            errorBox.style.display = 'block';
            errorDetail.textContent = '请先上传图片，并等待后台连接完成';
            return;
        }

        analyzeBtn.disabled = true;
        analyzeBtn.textContent = '分析中...';
        resultPlaceholder.textContent = 'AI正在分析...';
        errorBox.style.display = 'none';

        try {
            // 使用 Gradio 客户端直接调用
            const result = await gradioApp.predict("/predict", [selectedFile]);
            
            console.log("分析结果:", result);
            
            if (result.data && result.data.length >= 2) {
                const imgData = result.data[0];
                const diagnosis = result.data[1];
                
                if (imgData) {
                    resultImg.src = imgData.startsWith('data:') ? imgData : 'data:image/png;base64,' + imgData;
                    resultImg.style.display = 'block';
                    resultPlaceholder.style.display = 'none';
                }
                
                reportText.textContent = diagnosis;
                report.style.display = 'block';
            } else {
                throw new Error('返回数据格式错误: ' + JSON.stringify(result));
            }
        } catch (error) {
            console.error("分析失败:", error);
            errorBox.style.display = 'block';
            errorDetail.textContent = '分析失败: ' + error.message;
            resultPlaceholder.textContent = '分析失败';
        } finally {
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = '开始分析';
        }
    });
</script>
</body>
</html>
